# Build settings for Netlify. Set SITE_URL in the Netlify UI (Site settings → Environment)
# to your production origin, e.g. https://yourdomain.com (no trailing slash).
#
# Vercel: import repo, set Output Directory to dist (vercel.json sets build/output).
# Cloudflare Pages: build command npm run build, output dist, Node 22, SITE_URL in env.

[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "22"
